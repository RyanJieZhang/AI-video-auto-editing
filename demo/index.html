<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Video Auto Editing Agent Demo</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #5b6578;
        --line: #d9e2f2;
        --panel: #ffffff;
        --soft: #f5f8fc;
        --blue: #155bd5;
        --orange: #ff6a00;
        --green: #1f8a5b;
        --shadow: 0 16px 40px rgba(23, 32, 51, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #f7fbff 0%, #eef4ff 48%, #ffffff 100%);
      }

      header {
        padding: 36px 24px 24px;
        border-bottom: 1px solid var(--line);
        background:
          radial-gradient(circle at top right, rgba(21, 91, 213, 0.18), transparent 28%),
          linear-gradient(180deg, #ffffff 0%, #f6f9ff 100%);
      }

      .wrap {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--blue);
        font-weight: 700;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 64px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .lead {
        max-width: 820px;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.65;
      }

      main {
        padding: 26px 0 48px;
      }

      .demo-grid {
        display: grid;
        grid-template-columns: minmax(280px, 420px) 1fr;
        gap: 20px;
        align-items: start;
      }

      .panel {
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .controls {
        position: sticky;
        top: 16px;
        overflow: hidden;
      }

      .sample {
        padding: 18px;
        border-bottom: 1px solid var(--line);
      }

      .sample h2,
      .detail h2,
      .artifacts h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .sample p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .run-button {
        width: calc(100% - 36px);
        margin: 18px;
        height: 44px;
        border: 0;
        border-radius: 8px;
        color: #fff;
        background: var(--blue);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      .run-button:focus-visible,
      .step:focus-visible {
        outline: 3px solid rgba(21, 91, 213, 0.28);
        outline-offset: 2px;
      }

      .steps {
        padding: 10px;
      }

      .step {
        width: 100%;
        display: grid;
        grid-template-columns: 34px 1fr;
        gap: 10px;
        align-items: center;
        min-height: 54px;
        padding: 10px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        text-align: left;
        cursor: pointer;
      }

      .step + .step {
        margin-top: 6px;
      }

      .badge {
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        color: #fff;
        background: var(--blue);
        font-weight: 800;
      }

      .step:nth-child(4n) .badge,
      .step:nth-child(4n + 2) .badge {
        background: var(--orange);
      }

      .step strong {
        display: block;
        font-size: 14px;
      }

      .step span {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
      }

      .step.active {
        border-color: rgba(21, 91, 213, 0.4);
        background: #eef5ff;
      }

      .stage {
        min-height: 640px;
        overflow: hidden;
      }

      .stage-top {
        display: flex;
        gap: 14px;
        justify-content: space-between;
        align-items: center;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      .stage-title {
        margin: 0;
        font-size: 24px;
      }

      .skill-chip {
        padding: 8px 10px;
        border-radius: 8px;
        color: var(--blue);
        background: #eaf2ff;
        font: 700 13px ui-monospace, SFMono-Regular, Consolas, monospace;
        white-space: nowrap;
      }

      .stage-body {
        display: grid;
        grid-template-columns: 1fr minmax(240px, 330px);
        gap: 18px;
        padding: 20px;
      }

      .detail,
      .artifacts {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .detail p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.65;
      }

      .flow {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }

      .flow-card {
        min-height: 94px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
      }

      .flow-card b {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
      }

      .flow-card small {
        color: var(--muted);
        line-height: 1.4;
      }

      .artifact-list {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .artifact-list li {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfdff;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 13px;
      }

      .status-line {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 16px;
        color: var(--green);
        font-weight: 700;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--green);
      }

      .timeline {
        margin-top: 20px;
        padding: 18px 20px;
        border-top: 1px solid var(--line);
        background: #fbfdff;
      }

      .timeline-track {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 6px;
      }

      .tick {
        min-height: 8px;
        border-radius: 999px;
        background: #dbe6f7;
      }

      .tick.done {
        background: var(--blue);
      }

      .tick.current {
        background: var(--orange);
      }

      .caption {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 900px) {
        .demo-grid,
        .stage-body {
          grid-template-columns: 1fr;
        }

        .controls {
          position: static;
        }

        .flow {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        .stage-top {
          align-items: flex-start;
          flex-direction: column;
        }

        .flow {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <p class="eyebrow">Interactive Demo</p>
        <h1>AI 自动剪视频 Agent 是怎么运行的</h1>
        <p class="lead">
          这个 demo 用一个 60 秒短视频作为例子，展示 Codex Agent 如何按层调用 skills，
          从需求一路生成脚本、素材清单、时间线、动效计划、音频策略、Remotion 结构和发布资料。
        </p>
      </div>
    </header>

    <main class="wrap">
      <section class="demo-grid" aria-label="Agent workflow demo">
        <aside class="panel controls">
          <div class="sample">
            <h2>示例需求</h2>
            <p>
              制作一个 60 秒竖屏视频，讲清楚“为什么不要用一个万能 prompt 自动剪视频”，
              风格清晰、节奏快、适合发到 B 站或小红书。
            </p>
          </div>
          <button class="run-button" id="run">播放一次 Agent 流程</button>
          <div class="steps" id="steps"></div>
        </aside>

        <section class="panel stage" aria-live="polite">
          <div class="stage-top">
            <h2 class="stage-title" id="title"></h2>
            <div class="skill-chip" id="skill"></div>
          </div>
          <div class="stage-body">
            <article class="detail">
              <h2>这一层在做什么</h2>
              <p id="description"></p>
              <div class="flow" id="flow"></div>
              <div class="status-line">
                <span class="dot"></span>
                <span id="handoff"></span>
              </div>
            </article>
            <aside class="artifacts">
              <h2>产物</h2>
              <ul class="artifact-list" id="artifacts"></ul>
            </aside>
          </div>
          <div class="timeline">
            <div class="timeline-track" id="timeline"></div>
            <div class="caption" id="caption"></div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const layers = [
        {
          title: "1. Workflow Router",
          skill: "video-workflow-router",
          short: "判断当前阶段",
          description:
            "Agent 先不急着写代码或找素材，而是读取需求、AGENTS.md 和 workflow 文档，判断当前任务应该从哪一层开始，并指定下一步要产出的文件。",
          flow: [
            ["读取需求", "平台、时长、风格、素材"],
            ["识别阶段", "规划 / 脚本 / 素材 / Remotion"],
            ["选择 skill", "避免工具乱用"],
            ["决定产物", "下一层需要的文件"],
          ],
          artifacts: ["Active layer", "Using skill", "Next artifact"],
          handoff: "交给 Creative & Planning",
        },
        {
          title: "2. Creative & Planning",
          skill: "workflow template",
          short: "创意简报",
          description:
            "把模糊想法变成可制作的方向：主题、受众、hook、章节、视觉风格和事实核查点都会先写清楚。",
          flow: [
            ["主题", "这个视频到底讲什么"],
            ["受众", "给谁看"],
            ["Hook", "前 3 秒为什么停留"],
            ["结构", "分几个章节推进"],
          ],
          artifacts: ["plan/creative-brief.md"],
          handoff: "交给 Voiceover Editor",
        },
        {
          title: "3. Voiceover Editor",
          skill: "voiceover-editor",
          short: "口播脚本",
          description:
            "把创意写成能说出口的脚本，并拆成 spoken beats。每一句都会标注时长、语气和需要什么画面支持。",
          flow: [
            ["口语化", "不是文章腔"],
            ["拆 beat", "一句一个信息点"],
            ["估时长", "控制 60 秒节奏"],
            ["标画面", "A-roll / B-roll 需求"],
          ],
          artifacts: ["plan/script.md"],
          handoff: "交给 Asset Gathering",
        },
        {
          title: "4. Asset Gathering",
          skill: "asset-gathering",
          short: "素材池",
          description:
            "根据脚本列出需要的图片、视频、截图、音乐和音效，负责搜索、生成、下载、转码和验证，同时记录来源和版权状态。",
          flow: [
            ["列需求", "每个 beat 需要什么"],
            ["找素材", "用户文件 / 搜索 / 生成"],
            ["验证", "尺寸、时长、格式"],
            ["写 manifest", "来源、版权、用途"],
          ],
          artifacts: ["plan/asset-list.md", "assets/"],
          handoff: "交给 Asset Usage Planner",
        },
        {
          title: "5. Asset Usage Planner",
          skill: "asset-usage-planner",
          short: "素材拼接",
          description:
            "这一层不下载新素材，而是决定素材怎么用：哪个 beat 用哪段素材、是否重复、哪里缺素材、每个场景从几秒到几秒。",
          flow: [
            ["分场景", "一个 scene 一个语义段落"],
            ["对齐素材", "素材对应口播"],
            ["去重", "避免无意义 B-roll"],
            ["建时间线", "start / end / role"],
          ],
          artifacts: ["plan/timeline.md"],
          handoff: "交给 Motion Fragments",
        },
        {
          title: "6. Motion Fragments",
          skill: "motion-fragments",
          short: "高级动效",
          description:
            "设计 hook frame、数据卡、转场、字幕强调、网站 demo 放大聚焦和封面帧。它产出的是可给 Remotion 实现的动效计划。",
          flow: [
            ["Hook frame", "第一眼抓住注意力"],
            ["数据卡", "让信息可视化"],
            ["转场", "场景切换不生硬"],
            ["实现 notes", "组件名和动效意图"],
          ],
          artifacts: ["plan/motion-plan.md"],
          handoff: "交给 Audio Director",
        },
        {
          title: "7. Audio Director",
          skill: "audio-director",
          short: "声音策略",
          description:
            "规划 BGM、SFX、人声优先级、ducking、loop point 和淡入淡出，让声音服务口播和节奏，而不是抢戏。",
          flow: [
            ["选情绪", "紧张 / 清爽 / 科技感"],
            ["配 SFX", "只给关键动作加声音"],
            ["Ducking", "人声出现音乐降低"],
            ["写音频表", "time / asset / mix"],
          ],
          artifacts: ["plan/audio-plan.md"],
          handoff: "交给 Remotion Assembler",
        },
        {
          title: "8. Remotion Assembler",
          skill: "remotion-assembler",
          short: "代码装配",
          description:
            "把前面所有计划转成 Remotion 结构：Composition 定义视频，Scene 表达段落，Sequence 控制时间，editPlan 连接脚本、素材和动效。",
          flow: [
            ["Composition", "尺寸、FPS、总时长"],
            ["Scene", "语义段落组件"],
            ["Sequence", "时间摆放"],
            ["Layers", "字幕和音频层"],
          ],
          artifacts: ["src/", "src/data/editPlan.ts", "CaptionLayer", "AudioLayer"],
          handoff: "交给 Remotion Gotchas Index",
        },
        {
          title: "9. Remotion Gotchas Index",
          skill: "remotion-gotchas-index",
          short: "预览 QA",
          description:
            "这一层负责窄范围调试：预览空白、素材路径、字幕错位、音频不同步、frame math 和 render 错误都会在这里排查。",
          flow: [
            ["预览", "Studio 是否正常显示"],
            ["路径", "staticFile / public"],
            ["时序", "frame 与秒数换算"],
            ["窄修复", "不重写整条视频"],
          ],
          artifacts: ["QA notes", "render fixes"],
          handoff: "交给 Platform Packaging",
        },
        {
          title: "10. Platform Packaging",
          skill: "platform-packaging",
          short: "发布包装",
          description:
            "最后准备标题、描述、timestamps、hashtags、封面建议、导出设置和发布检查清单。视频不再大改，只处理发布需要的材料。",
          flow: [
            ["标题", "多版本标题"],
            ["描述", "平台发布文案"],
            ["封面", "cover frame notes"],
            ["导出", "比例、分辨率、QA"],
          ],
          artifacts: ["exports/packaging.md", "exports/final-video.mp4"],
          handoff: "交给 Prompt Lab 复盘",
        },
      ];

      const stepsEl = document.querySelector("#steps");
      const titleEl = document.querySelector("#title");
      const skillEl = document.querySelector("#skill");
      const descriptionEl = document.querySelector("#description");
      const flowEl = document.querySelector("#flow");
      const artifactsEl = document.querySelector("#artifacts");
      const handoffEl = document.querySelector("#handoff");
      const timelineEl = document.querySelector("#timeline");
      const captionEl = document.querySelector("#caption");
      const runButton = document.querySelector("#run");

      let active = 0;
      let timer = null;

      function renderSteps() {
        stepsEl.innerHTML = "";
        layers.forEach((layer, index) => {
          const button = document.createElement("button");
          button.className = `step${index === active ? " active" : ""}`;
          button.type = "button";
          button.innerHTML = `
            <span class="badge">${index + 1}</span>
            <span>
              <strong>${layer.title.replace(/^\d+\.\s/, "")}</strong>
              <span>${layer.short}</span>
            </span>
          `;
          button.addEventListener("click", () => {
            stopRun();
            setActive(index);
          });
          stepsEl.appendChild(button);
        });
      }

      function renderTimeline() {
        timelineEl.innerHTML = "";
        layers.forEach((_, index) => {
          const tick = document.createElement("div");
          tick.className = "tick";
          if (index < active) tick.classList.add("done");
          if (index === active) tick.classList.add("current");
          timelineEl.appendChild(tick);
        });
        captionEl.textContent = `当前进度：第 ${active + 1} 层 / 共 ${layers.length} 层`;
      }

      function setActive(index) {
        active = index;
        const layer = layers[index];
        titleEl.textContent = layer.title;
        skillEl.textContent = layer.skill;
        descriptionEl.textContent = layer.description;
        handoffEl.textContent = layer.handoff;

        flowEl.innerHTML = "";
        layer.flow.forEach(([name, text]) => {
          const card = document.createElement("div");
          card.className = "flow-card";
          card.innerHTML = `<b>${name}</b><small>${text}</small>`;
          flowEl.appendChild(card);
        });

        artifactsEl.innerHTML = "";
        layer.artifacts.forEach((artifact) => {
          const li = document.createElement("li");
          li.textContent = artifact;
          artifactsEl.appendChild(li);
        });

        renderSteps();
        renderTimeline();
      }

      function stopRun() {
        if (timer) {
          clearInterval(timer);
          timer = null;
          runButton.textContent = "播放一次 Agent 流程";
        }
      }

      function startRun() {
        stopRun();
        setActive(0);
        runButton.textContent = "正在播放流程...";
        timer = setInterval(() => {
          if (active >= layers.length - 1) {
            stopRun();
            return;
          }
          setActive(active + 1);
        }, 1400);
      }

      runButton.addEventListener("click", startRun);
      setActive(0);
    </script>
  </body>
</html>
